
llm:
  provider: "gemini"  # Can be: gemini, openai, anthropic, etc.
  model_name: "gemini/gemini-2.0-flash-exp"
  embedding_model: "text-embedding-004"
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.95
  timeout: 30
  max_retries: 3

generation_params:
  default_temperature: 0.7
  creative_temperature: 0.9
  precise_temperature: 0.1
  
embedding:
  batch_size: 128
  dimension: 768